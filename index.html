        const rDr = (rm, d, st, ui, a, iIt) => { let dx = 0, dy = 0, rt = 0; if (d.edge === 'top') dx = d.offset; else if (d.edge === 'bottom') { dx = d.offset + d.width; dy = rm.h; rt = 180 } else if (d.edge === 'left') { dy = d.offset + d.width; rt = 270 } else if (d.edge === 'right') { dx = rm.w; dy = d.offset; rt = 90 } const iD = ui.dragD?.doorId === d.id, tf = `${d.swing === 'right' ? `translate(${d.width}, 0) scale(-1, 1) ` : ''}${d.direction === 'out' ? '' : 'scale(1, -1) '}`; return <g transform={`translate(${rm.x + dx}, ${rm.y + dy}) rotate(${rt})`} key={`d-${rm.id}-${d.id}`} className={[2, 3].includes(st) ? (iD ? "cursor-grabbing" : "cursor-grab") : ""} onPointerDown={[2, 3].includes(st) ? e => { e.stopPropagation(); e.target.setPointerCapture(e.pointerId); a.setUi(p => ({ ...p, dragD: { roomId: rm.id, doorId: d.id, isIt: iIt } })) } : undefined} onDoubleClick={[2, 3].includes(st) ? e => { e.stopPropagation(); const f = o => o.map(x => { if (x.id !== d.id) return x; const eg = ['top', 'right', 'bottom', 'left']; return { ...x, edge: eg[(eg.indexOf(x.edge) + 1) % 4], offset: 0 } }); iIt ? a.setRooms(p => p.map(r => r.id !== rm.id ? r : { ...r, doors: f(r.doors || []) })) : a.setAnc(p => p.map(r => r.id !== rm.id ? r : { ...r, doors: f(r.doors) })) } : undefined}><rect x="0" y="-30" width={d.width} height="60" fill={iD ? "#e5e7eb" : (iIt ? SPACE_COLORS['IT'] : rm.color)} stroke="#111827" strokeWidth="10" />{d.type === 'single' && <g transform={tf}><path d={`M 0,0 L 0,${-d.width} A ${d.width} ${d.width} 0 0 1 ${d.width},0`} fill="none" stroke="#111827" strokeWidth="25" strokeDasharray="30,30" /><line x1="0" y1="0" x2="0" y2={-d.width} stroke="#111827" strokeWidth="25" strokeLinecap="round" /></g>}{d.type === 'double' && <g transform={tf}><path d={`M 0,0 L 0,${-d.width / 2} A ${d.width / 2} ${d.width / 2} 0 0 1 ${d.width / 2},0`} fill="none" stroke="#111827" strokeWidth="25" strokeDasharray="30,30" /><line x1="0" y1="0" x2="0" y2={-d.width / 2} stroke="#111827" strokeWidth="25" strokeLinecap="round" /><path d={`M ${d.width},0 L ${d.width},${-d.width / 2} A ${d.width / 2} ${d.width / 2} 0 0 0 ${d.width / 2},0`} fill="none" stroke="#111827" strokeWidth="25" strokeDasharray="30,30" /><line x1={d.width} y1="0" x2={d.width} y2={-d.width / 2} stroke="#111827" strokeWidth="25" strokeLinecap="round" /></g>}{d.type === 'sliding' && <g transform={tf}><line x1="-100" y1="-20" x2={d.width / 2 + 100} y2="-20" stroke="#111827" strokeWidth="25" strokeLinecap="round" /><line x1={d.width / 2 - 100} y1="20" x2={d.width + 100} y2="20" stroke="#111827" strokeWidth="25" strokeLinecap="round" /><path d={`M -50,-20 L -100,-60 L 0,-60 Z`} fill="#111827" /><path d={`M ${d.width + 50},20 L ${d.width + 100},60 L ${d.width},60 Z`} fill="#111827" /></g>}{[2, 3].includes(st) && <g transform={tf}><rect x="0" y={-d.width} width={d.width} height={d.width} fill="transparent" stroke={iD ? "#000" : "transparent"} strokeWidth="10" strokeDasharray="20,20" /></g>}</g> };
        const rStDet = (r, fH = 5000, step, ui, a, flrs = [], ans = []) => { 
            if (r.type === 'STAIRS') { 
                const p = 0, w = Math.max(0, r.w), h = Math.max(0, r.h);
                const e = r.evacType || 'normal', a_type = r.anteType || 'room', stT = r.stairType || 'U', sL = r.stairLayout || 'combo'; 
                
                const ah = e === 'special' ? Math.max(2000, h * 0.25) : 0; 
                const sh = h - ah; 

                const wallThick = (e === 'indoor' || e === 'special') ? 200 : 20;

                const hasTopLand = r.topLanding !== false;
                const hasBottomLand = r.bottomLanding !== false;

                        {stT === 'straight' && (() => {

                                <line x1={-50} y1={mY + 200} x2={ew + 50} y2={mY} stroke="#000000" strokeWidth="15" />

                            const sDnStart = { x: ew / 2, y: hasTopLand ? sTopLand / 2 : 100 };
                            const sDnMid = { x: ew / 2, y: mY };

                            let arrowSVG = null;
                            const dotR = 90;
                            const arrowW = 120;
                            const arrowL = 240;
                            const textFS = 1000;
                            const textOff = 130;

                            if (isB) {
                                arrowSVG = <>
                                    <circle cx={sUpStart.x} cy={sUpStart.y} r={dotR} fill="#000000" />
                                    <text x={sUpStart.x - textOff} y={sUpStart.y} fill="#000000" fontSize={textFS} fontWeight="bold" textAnchor="end" dominantBaseline="middle">上</text>

                        {stT === 'straight' && (() => {

                            const sTopLand = esh * (tLandDepth / validInnerH);

                        <div className="text-[10px] font-bold text-gray-400 border-b border-gray-200 pb-1 mt-4 mb-2 uppercase tracking-wider">{t('neighborLimitParams')}</div>

                        <div className="grid grid-cols-2 gap-2"><div><label className="block text-[10px] text-gray-600 mb-1">{t('baseH')}</label><input type="number" value={lp.northH} onChange={e => a.setLimitParams(p => ({ ...p, northH: Number(e.target.value) }))} className="w-full border border-gray-300 bg-white rounded px-2 py-1 text-xs outline-none focus:border-black font-mono" /></div><div><label className="block text-[10px] text-gray-600 mb-1">{t('slope')}</label><input type="number" step="0.1" value={lp.northSlope} onChange={e => a.setLimitParams(p => ({ ...p, northSlope: Number(e.target.value) }))} className="w-full border border-gray-300 bg-white rounded px-2 py-1 text-xs outline-none focus:border-black font-mono" /></div></div>
                    </div>}
                </div>
            </div>
        });
        const Step6 = memo(({ s, a, t }) => <div className="space-y-5 animate-in fade-in duration-300">
            <div className="bg-white p-5 rounded-xl border border-gray-200 shadow-sm"><h2 className="text-sm font-bold text-black flex items-center gap-2 mb-2"><Icon name="Box" size={18} /> {t('infoViz')}</h2><p className="text-xs text-gray-500 mb-5">{t('infoVizDesc')}</p><div className="bg-gray-50 p-4 rounded-lg border border-gray-200"><label className="text-xs font-bold text-gray-700 mb-3 block">{t('explodeSpacing')}</label><input type="range" min="15000" max="50000" step="1000" value={s.expSpc} onChange={e => a.setExpSpc(Number(e.target.value))} className="w-full accent-black" /><div className="text-right text-[10px] text-black font-mono font-bold mt-2">{s.expSpc} mm</div></div></div>
        </div>);

        const Step7 = memo(({ s, a, t }) => <div className="space-y-5 animate-in fade-in duration-300">
            <div className="bg-white p-5 rounded-xl border border-gray-200 shadow-sm">

                    ...p,

                }))} className="w-full py-2 bg-black text-white rounded-lg text-xs font-bold mb-4">{t('addCrane')}</button>

                {(s.outLogistics?.cranes || []).map(c => (
                    <div key={c.id} className="bg-gray-50 p-3 rounded-lg border border-gray-200 mb-2">
                        <div className="flex justify-between items-center mb-2">

                            <div className="grid grid-cols-2 gap-2 text-[10px]">
                            <div>
                                <label>{t('boomLen')}</label>
                                <input type="number" value={c.boomLen || c.radius || 0} onChange={e => a.setOutLogistics(p => ({ ...p, cranes: (p.cranes || []).map(x => x.id === c.id ? { ...x, boomLen: Number(e.target.value) } : x) }))} className="w-full border rounded px-1" />

        const Step8 = memo(({ s, a, t }) => {

                        <input type="number" value={logistics?.cartParams?.h || 6000} onChange={e => a.setLogistics(p => ({ ...p, cartParams: { ...(p.cartParams||{}), h: Number(e.target.value) } }))} className="border px-2 py-1 rounded" />
                        <input type="number" value={logistics?.cartParams?.zEq || 2200} onChange={e => a.setLogistics(p => ({ ...p, cartParams: { ...(p.cartParams||{}), zEq: Number(e.target.value) } }))} className="border px-2 py-1 rounded" />
                    </div>

                    <div className="flex gap-2">
                        <button onClick={() => a.setLogistics(p => ({ ...p, mode: 'auto' }))} className="flex-1 py-2 bg-blue-600 text-white rounded">{t('calcPath')}</button>
                        <button onClick={() => { a.setLogistics(p => ({ ...p, mode: null, paths: [...(p.paths||[]), { id: Date.now(), floor: aFlr, path: [] }] })); }} className="flex-1 py-2 bg-black text-white rounded">{t('savePath')}</button>
                    </div>
                </div>

                <div className="bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
                    <h3 className="text-xs font-bold text-gray-600 mb-2">{t('savedPaths')}</h3>
                    <div className="space-y-2 text-xs">
                        {(logistics?.paths || []).map(p => <div key={p.id} className="flex items-center justify-between bg-gray-50 p-2 rounded border border-gray-100"><div className="font-mono">ID: {p.id} | {p.floor}</div><div className="flex gap-2"><button onClick={() => a.setLogistics(ls => ({ ...ls, paths: ls.paths.filter(x => x.id !== p.id) }))} className="text-xs bg-red-600 text-white px-2 py-1 rounded">{t('del')}</button></div></div>)}
                        {!(logistics?.paths || []).length && <div className="text-xs text-gray-400">{t('noSavedPaths')}</div>}
                    </div>
                </div>
            </div>;
        });

        const Sidebar = memo(({ s, a, t }) => {
           const tb = [{ s: 1, i: "ScanLine", t: t('step1') }, { s: 2, i: "LayoutDashboard", t: t('step2') }, { s: 3, i: "Blocks", t: t('step3') }, { s: 4, i: "TableProperties", t: t('step4') }, { s: 5, i: "Scissors", t: t('step5') }, { s: 6, i: "Box", t: t('step6') }, { s: 7, i: "Construction", t: t('step7') }, { s: 8, i: "Truck", t: t('step8') }];
            return <aside className={`bg-white border-r border-gray-200 shadow-xl flex flex-col h-full z-20 shrink-0 relative transition-all duration-300 ${s.ui?.sideOpen !== false ? 'w-[360px]' : 'w-0 overflow-hidden opacity-0'}`}>
                <div className="flex items-center justify-between px-5 py-4 bg-[#F3F4F6] border-b border-gray-200 shrink-0"><div className="flex items-center gap-3"><div className="flex items-center gap-2"><div className="bg-black text-white text-[11px] font-black w-7 h-7 rounded flex items-center justify-center leading-none">DC</div><div className="text-xl font-black text-gray-900 tracking-tighter">PLANNER <span className="text-sm font-bold text-gray-400">{t('pro')}</span></div></div><div className="h-4 w-px bg-gray-300" /><div className="text-[11px] font-black tracking-[0.15em] text-gray-800 uppercase">FS</div></div><div className="flex items-center gap-3.5 text-gray-400"><button onClick={() => a.setLang(l => l === 'tw' ? 'jp' : 'tw')} className="text-xs font-bold bg-white border border-gray-300 px-2 py-0.5 rounded text-gray-700 hover:bg-gray-100">{t('langToggle')}</button><button className="hover:text-black transition"><Icon name="Settings" size={19} /></button><button onClick={() => a.setUi(p => ({ ...p, info: !0 }))} className="hover:text-black transition" title={t('aboutTool')}><Icon name="Info" size={19} /></button></div></div>

                {![1, 4, 5, 6].includes(s.step) && <div className="absolute bottom-0 left-0 right-0 p-5 bg-white/95 backdrop-blur-sm border-t border-gray-200 z-50"><div className="flex items-center justify-between bg-white text-black p-4 rounded-xl shadow-lg border border-gray-200"><div className="text-sm font-bold text-gray-500">{t('totalRackCapacity')}</div><div className="text-3xl font-black">{s.layout.totalRacks} <span className="text-sm font-bold text-gray-400">Racks</span><span className="text-lg text-gray-400 ml-4 font-mono">≒ {(s.layout.totalRacks * s.params.kw / 1000).toFixed(2)} MW</span></div></div></div>}
            </aside>
        });

        const Toolbar = memo(({ s, a, t }) => {
            const { step, floors, fVis, aFlr, secs, showEsc, hist, ui, meas, buildings, activeBuilding } = s, eFs = floors.filter(f => !f.isSeismic && (f.buildingId || 'B1') === activeBuilding).map(f => f.name);

            // 👇 新增：浮動面板的拖曳狀態與事件 👇
            const [panelPos, setPanelPos] = useState({ x: 80, y: 80 });
            const [dragging, setDragging] = useState(false);
            const [rel, setRel] = useState({ x: 0, y: 0 });
            const [showBeamPanel, setShowBeamPanel] = useState(false);
            const onDown = (e) => { e.stopPropagation(); e.target.setPointerCapture(e.pointerId); setDragging(true); setRel({ x: e.clientX - panelPos.x, y: e.clientY - panelPos.y }); };
            const onMove = (e) => { if (!dragging) return; e.stopPropagation(); setPanelPos({ x: e.clientX - rel.x, y: e.clientY - rel.y }); };
            const onUp = (e) => { if (!dragging) return; e.stopPropagation(); setDragging(false); e.target.releasePointerCapture(e.pointerId); };

            // 👇 新增：右上角主工具列的拖曳狀態與事件 👇
            const [toolPos, setToolPos] = useState({ x: 80, y: 20 });
            const [toolDragging, setToolDragging] = useState(false);
            const [toolRel, setToolRel] = useState({ x: 0, y: 0 });
            const onToolDown = (e) => { e.stopPropagation(); e.target.setPointerCapture(e.pointerId); setToolDragging(true); setToolRel({ x: e.clientX - toolPos.x, y: e.clientY - toolPos.y }); };
            const onToolMove = (e) => { if (!toolDragging) return; e.stopPropagation(); setToolPos({ x: e.clientX - toolRel.x, y: e.clientY - toolRel.y }); };
            const onToolUp = (e) => { if (!toolDragging) return; e.stopPropagation(); setToolDragging(false); e.target.releasePointerCapture(e.pointerId); };
            return <>
                <div className="absolute top-5 left-5 z-10 flex flex-col gap-3">

                            <Icon name="Menu" size={18} />
                        </button>
                        {/* 👇 desktop sidebar toggle button 👇 */}
                        <button onClick={() => a.setUi(p => ({ ...p, sideOpen: p.sideOpen === false ? true : false }))} className="hidden md:flex bg-white/95 backdrop-blur p-2.5 rounded-xl shadow-sm border border-gray-200 text-gray-700 hover:text-black hover:bg-gray-50 transition">

                        <div className="mt-2 w-full flex justify-center">
                            <select value={s.activeBuilding} onChange={e => a.setActiveBuilding(e.target.value)} className="text-xs border border-gray-300 rounded px-2 py-1 bg-white">
                                {s.buildings && s.buildings.map(b => <option key={b.id} value={b.id}>{b.name}</option>)}
                            </select>
                        </div>
                    </div>}
                    {![5, 6].includes(step) && <div className="relative w-full"><button onClick={() => a.setUi(p => ({ ...p, vMenu: !p.vMenu }))} className={`w-full px-3 py-2.5 rounded-xl text-xs font-bold shadow-sm border transition flex items-center justify-center gap-2 ${ui.vMenu ? 'bg-black border-black text-white shadow-md' : 'bg-white/95 backdrop-blur border-gray-200 text-gray-700 hover:bg-gray-50 hover:text-black'}`}><Icon name="LayoutDashboard" size={14} /> {t('displaySettings')}</button>{ui.vMenu && <div className="absolute top-full left-0 mt-2 bg-white/95 backdrop-blur border border-gray-200 shadow-xl rounded-xl p-3.5 flex flex-col gap-3 w-44 animate-in fade-in slide-in-from-top-2">
                                <label className="flex items-center justify-between cursor-pointer text-xs font-bold text-gray-700 hover:text-black"><span className="flex items-center gap-1.5"><Icon name="Scissors" size={14} /> {t('sectionLine')}</span><input type="checkbox" checked={secs.show} onChange={() => a.setSecs(p => ({ ...p, show: !p.show }))} className="accent-black w-4 h-4" /></label>
                                <label className="flex items-center justify-between cursor-pointer text-xs font-bold text-gray-700 hover:text-black"><span className="flex items-center gap-1.5"><Icon name="Footprints" size={14} /> {t('walkingLine')}</span><input type="checkbox" checked={showEsc} onChange={() => a.setShowEsc(p => !p)} className="accent-black w-4 h-4" /></label>
                                <label className="flex items-center justify-between cursor-pointer text-xs font-bold text-gray-700 hover:text-black"><span className="flex items-center gap-1.5"><Icon name="Server" size={14} /> {t('showEq')}</span><input type="checkbox" checked={ui.showEq !== false} onChange={() => a.setUi(p => ({ ...p, showEq: p.showEq === false ? true : false }))} className="accent-black w-4 h-4" /></label>
                                <label className="flex items-center justify-between cursor-pointer text-xs font-bold text-gray-700 hover:text-black"><span className="flex items-center gap-1.5">顯示結構梁</span><input type="checkbox" checked={secs.beams !== !1} onChange={e => a.setSecs(p => ({ ...p, beams: e.target.checked }))} className="accent-black w-4 h-4" /></label>
                            </div>}</div>}
                </div>
                <div onPointerDown={onToolDown} onPointerMove={onToolMove} onPointerUp={onToolUp} style={{ left: toolPos.x, top: toolPos.y, position: 'absolute' }} className="z-10 flex flex-nowrap justify-end gap-2 w-max cursor-grab">
                    <button onClick={a.undo} disabled={hist.idx <= 0} className="bg-white px-3 py-2 rounded-xl shadow-sm border border-gray-200 text-xs font-bold text-gray-700 hover:text-black hover:bg-gray-50 disabled:opacity-40 transition flex items-center justify-center w-8" title={t('undo')}><Icon name="Undo" size={16} /></button>
                    <button onClick={a.redo} disabled={hist.idx >= hist.lst.length - 1} className="bg-white px-3 py-2 rounded-xl shadow-sm border border-gray-200 text-xs font-bold text-gray-700 hover:text-black hover:bg-gray-50 disabled:opacity-40 transition flex items-center justify-center w-8" title={t('redo')}><Icon name="Redo" size={16} /></button>
                    {![5, 6].includes(step) && <button onClick={() => a.setUi(p => ({ ...p, meas: !p.meas }))} className={`px-3 py-2 rounded-xl shadow-sm border text-xs font-bold transition flex items-center gap-1 ${ui.meas ? 'bg-black text-white border-black shadow-md' : 'bg-white text-gray-700 border-gray-200 hover:bg-gray-50 hover:text-black'}`}><Icon name="Ruler" size={14} /> {t('measure')}</button>}
                    {step === 5 && <button onClick={() => setShowBeamPanel(p => !p)} className={`px-3 py-2 rounded-xl shadow-sm border text-xs font-bold transition flex items-center gap-1 ${showBeamPanel ? 'bg-black text-white border-black shadow-md' : 'bg-white text-gray-700 border-gray-200 hover:bg-gray-50 hover:text-black'}`}><Icon name="Hash" size={14} /> 梁設定</button>}

            const parsedObstaclePolys = useMemo(() => {

                const realRooms = [...(rooms || []), ...(anc || [])].filter(r => r.floor === aFlr && !['OUTDOOR', 'SEMI_OUTDOOR'].includes(r.type));

            }, [rooms, anc, layout?.columns, aFlr]);

            const vState = useRef({ x: (bdOffset?.x || 0) + 2000, y: (bdOffset?.y || 0) + 2000, h: 0, s: 0, sa: 0 });
            const keys = useRef({ w: false, a: false, s: false, d: false });

                const cfg = logistics.cartParams || {};
                const cf = { length: cfg.h || 6000, width: cfg.w || 2500, wheelbase: (cfg.h || 6000) * 0.7, rearOverhang: (cfg.h || 6000) * 0.15, maxSteer: Math.PI / 2.5, maxSpeed: 10, acc: 0.5, fric: 1, strSpd: 0.05 };

                                    {iRSeismic.map((r, ri) => { const zh = fb.h, ty = sy, ft = fmtTxt(r.type === undefined ? 'Data Hall' : r.name, r.h), fl = r.type === 'VOID' ? '#ffffff' : (r.color || SPACE_COLORS[r.type] || '#f1f5f9'), st = r.type === 'VOID' ? '#ef4444' : '#64748b', da = r.type === 'VOID' ? '50,50' : ''; return <g key={`sxsyr-${r.id}-${ri}`}><rect x={r.y} y={ty} width={r.h} height={zh} fill={fl} opacity="1" /><line x1={r.y} y1={ty} x2={r.y} y2={ty + zh} stroke={st} strokeWidth={15} strokeDasharray={da} /><line x1={r.y + r.h} y1={ty} x2={r.y + r.h} y2={ty + zh} stroke={st} strokeWidth={15} strokeDasharray={da} />{r.h > 800 && r.type !== 'VOID' && <text x={r.y + r.h / 2} y={ty + zh / 2} textAnchor="middle" dominantBaseline="middle" fill={SPACE_TEXT_COLORS[r.type] || '#1E293B'} fontSize={ft.fs} fontWeight="bold">{ft.t}</text>}</g> })}
                                </g>;
                            }
                            const sH = fb.h - 300, sY = -fb.bottomY - sH, fR = [...rooms, ...anc].filter(r => r.floor === fb.floor && (r.buildingId || 'B1') === activeBuilding && r.type !== 'OUTDOOR'), iR = fR.filter(r => r.x <= secs.x && r.x + r.w >= secs.x).sort((a, b) => a.y - b.y);
                            let cp = 0; const cr = []; iR.forEach(r => { if (r.y > cp + 10) cr.push({ s: cp, w: r.y - cp }); cp = Math.max(cp, r.y + r.h) }); if (cp < sw - 10) cr.push({ s: cp, w: sw - cp });
                            return <g key={`sxb-${fb.floor}`}>
                                {i === 0 && <rect x={0} y={sy} width={sw} height={300} fill="#94a3b8" />}

                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/20 backdrop-blur-sm animate-in fade-in duration-200" onPointerDown={() => setUi(p => ({ ...p, info: !1 }))}>
                            <div className="bg-white p-6 rounded-2xl shadow-2xl border border-gray-200 max-w-sm w-full relative" onPointerDown={e => e.stopPropagation()}>
                                <button onClick={() => setUi(p => ({ ...p, info: !1 }))} className="absolute top-4 right-4 text-gray-400 hover:text-black transition"><Icon name="Plus" size={20} className="rotate-45" /></button>
                                <div className="flex items-center gap-3 mb-4 border-b border-gray-100 pb-3">
                                    <div className="bg-black text-white p-2 rounded-lg"><Icon name="Info" size={20} /></div>
                                    <h2 className="text-lg font-black text-gray-900 tracking-tight">{t('aboutTool')}</h2>
                                </div>
                                <div className="text-sm text-gray-600 leading-relaxed space-y-2 font-medium">
                                    <p>{t('about1')}</p>
                                    <p>{t('about2')}</p>
                                    <p>{t('about3')}</p>
                                </div>
                                <div className="mt-5 pt-3 border-t border-gray-100 text-right text-[11px] font-bold text-gray-400 tracking-widest uppercase">
                                    {t('developedBy')}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            )
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
