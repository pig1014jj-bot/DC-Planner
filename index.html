                                    <button onClick={() => { runValidation(); setUpStatus({ m: '✅ 檢查完成，請查看側邊結果', t: 'success' }) }} className="text-xs bg-blue-600 text-white px-3 py-1 rounded font-bold shadow-sm hover:bg-blue-700 transition">檢查</button>
                                    <button onClick={() => { previewAutoFix(); setUpStatus({ m: '⚠️ 已產生預覽修正，按套用以執行', t: 'info' }) }} className="text-xs bg-yellow-400 text-black px-3 py-1 rounded font-bold shadow-sm hover:bg-yellow-500 transition">預覽修正</button>
                                    <button onClick={() => { if (window.confirm('確定套用自動修正並儲存快照？')) applyAutoFix(true); }} className="text-xs bg-green-600 text-white px-3 py-1 rounded font-bold shadow-sm hover:bg-green-700 transition">套用修正</button>
                                    <button onClick={() => setUi(p => ({...p, minToolbar: true}))} className="ml-1 text-gray-400 hover:text-black rounded-lg p-1 hover:bg-gray-100 transition"><Icon name="ChevronUp" size={14} /></button>
                                </div>
                            )}
                        </div>

                        {/* 👇 修正：放置點選的浮動提示移至畫面下方 👇 */}
                        {(ui.placeLog || ui.placeCrane) && (
                            <div className="absolute bottom-32 left-1/2 -translate-x-1/2 z-[100] bg-blue-600 text-white px-8 py-4 rounded-full font-black shadow-2xl animate-bounce">
                                <span className="flex items-center gap-3">
                                    <Icon name="MousePointerClick" size={18} />
                                    請在畫布下方點選以放置 {ui.placeLog === 'start' ? '搬運起點' : ui.placeLog === 'end' ? '搬運終點' : '吊車中心點'}
                                </span>
                            </div>
                        )}
                        
                        {/* 將原本的 Workspace 標籤加上動態游標 */}
                        <div className={ui.placeLog || ui.placeCrane ? "cursor-crosshair w-full h-full" : "w-full h-full"}>
                            <Workspace s={{ vb: ui.vb, svgRef, room, dxf, grid, layout, layoutsByBuilding, rooms, anc, floors, fVis, aFlr, step, secs, secData, escPath, limitParams, expSpc, ui, params, meas, areaRep, refDxf, sitePoly, bldgPoly, currBP, drawMode, tempPt, showEsc, bdOffset, buildings, activeBuilding, outLogistics, logistics }} a={{ setUi, setGrid, setRooms, setAnc, setDelCol, pt, ptLocal, setSelRm, getBP, activeBuildingId: activeBuilding, setOutLogistics, setLogistics }} />
                        </div>

                        {/* 🌟 物理引擎掛載點 */}
                        <DriveOverlay s={{ vb: ui.vb, logistics, rooms, anc, floors, aFlr, bdOffset, layout, room, buildings, activeBuilding }} a={{ setLogistics, setUi }} />

                        {step === 6 && (
                            <div className="absolute top-5 left-5 z-20 bg-white/95 backdrop-blur shadow-xl rounded-xl border border-gray-200 p-5 w-[320px] pointer-events-auto animate-in fade-in slide-in-from-top-4 duration-300">
                                <h3 className="text-sm font-black text-black mb-4 flex items-center gap-2"><Icon name="LayoutDashboard" size={18} /> 空間圖例 (Legend)</h3>
                                <div className="grid grid-cols-2 gap-y-3 gap-x-2">
                                    {[
                                        { id: 'EV_LOBBY', label: 'Elevator Lobby' },
                                        { id: 'IDF', label: 'IDF (網路房)' },
                                        { id: 'IT', label: 'Data Hall' },
                                        { id: 'STAIRS', label: 'StairCase' },
                                        { id: 'UPS', label: 'UPS / Battery' },
                                        { id: 'LV', label: 'LV / MEP' },
                                        { id: 'AHU', label: 'AHU / 空調' },
                                        { id: 'OFFICE', label: 'Office / 辦公' }
                                    ].map(item => (
                                        <div key={item.id} className="flex items-center gap-2">
                                            <div className="w-5 h-5 rounded shadow-sm border border-black/10 shrink-0" style={{ backgroundColor: SPACE_COLORS[item.id] }}></div>
                                            <span className="text-xs text-gray-700 font-bold whitespace-nowrap overflow-hidden text-ellipsis" title={item.label}>{item.label}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                        {/* Floating touch buttons for iPad / touch */}
                        {isTouchCap && (
                            <div className="absolute bottom-6 right-6 z-40 flex flex-col gap-3 touch-float-btn">
                                <button onClick={() => { setUi(p => ({ ...p, meas: false, mStart: null })); setUi(p => ({ ...p, vMenu: false })); }} className="bg-white/95 px-4 py-3 rounded-full shadow-lg border border-gray-200 font-bold">取消</button>
                                <button onClick={() => { if (logistics?.mode === 'manual') { setLogistics(p => ({ ...p, mode: null, paths: [...(p.paths || []), { id: Date.now(), floor: aFlr, path: [] }] })); } }} className="bg-black text-white px-4 py-3 rounded-full shadow-lg border border-black font-bold">完成</button>
                            </div>
                        )}
                    </div>

                    {ui.info && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/20 backdrop-blur-sm animate-in fade-in duration-200" onPointerDown={() => setUi(p => ({ ...p, info: !1 }))}>
                            <div className="bg-white p-6 rounded-2xl shadow-2xl border border-gray-200 max-w-sm w-full relative" onPointerDown={e => e.stopPropagation()}>
                                <button onClick={() => setUi(p => ({ ...p, info: !1 }))} className="absolute top-4 right-4 text-gray-400 hover:text-black transition"><Icon name="Plus" size={20} className="rotate-45" /></button>
                                <div className="flex items-center gap-3 mb-4 border-b border-gray-100 pb-3">
                                    <div className="bg-black text-white p-2 rounded-lg"><Icon name="Info" size={20} /></div>
                                    <h2 className="text-lg font-black text-gray-900 tracking-tight">關於此工具</h2>
                                </div>
                                <div className="text-sm text-gray-600 leading-relaxed space-y-2 font-medium">
                                    <p>這是一個前期FS Study用的簡便工具</p>
                                    <p>幫助你在DC的檢討上快速便捷了解整體狀況而不耗費時間</p>
                                    <p>從平面到斷面再到視覺化，讓你可以簡單的操作上手並再最後將成果帶入BIM裡發展下去</p>
                                </div>
                                <div className="mt-5 pt-3 border-t border-gray-100 text-right text-[11px] font-bold text-gray-400 tracking-widest uppercase">
                                    by Wu chieh chun
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            )
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
